# =============================================
# CONFIGURAÇÃO DO SUPABASE CLI
# =============================================
# Este arquivo é usado pelo Supabase CLI para deploy.
#
# project_id: ID do projeto Supabase
#
# verify_jwt = false: Desabilita verificação automática de JWT do Supabase Auth.
# Usamos sistema JWT customizado - cada Edge Function faz sua própria
# validação via validateToken() no auth-utils.ts.
# Se fosse true, o Supabase exigiria token do Supabase Auth antes de executar.
# =============================================

project_id = "SEU_PROJECT_ID"

[functions.onboarding]
verify_jwt = false

[functions.whatsapp-instances]
verify_jwt = false

[functions.whatsapp-webhook]
verify_jwt = false

[functions.process-document]
verify_jwt = false

[functions.chat-ai]
verify_jwt = false

[functions.check-first-admin]
verify_jwt = false

[functions.manage-scheduling]
verify_jwt = false

[functions.send-reminders]
verify_jwt = false

[functions.resend-reminder]
verify_jwt = false

[functions.check-plan-limits]
verify_jwt = false

[functions.admin-data]
verify_jwt = false

[functions.data-api]
verify_jwt = false

[functions.registration-status]
verify_jwt = false

